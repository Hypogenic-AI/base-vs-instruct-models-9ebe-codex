idea:
  title: What's surprisingly different between base and instruct models?
  domain: artificial_intelligence
  hypothesis: 'By comparing the token-by-token divergence between a base and an instruct
    model, and training a model to predict the KL divergence (or similar measure)
    at every token, we can identify locations where the divergence predictor fails.
    These locations may reveal surprising or interesting differences between the models.

    '
  background:
    description: 'Take a base and an instruct model. Look at the divergence between
      their distributions, token by token. Train a model to predict the KL (or whatever)
      between them at every token. Then look at places where the divergence predictor
      is wrong. I think that''s where the interesting stuff will be.

      '
